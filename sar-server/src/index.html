<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAR Actor Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    overflow: hidden;
  }
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; }
  #header .controls { display: flex; gap: 12px; align-items: center; }
  #header button {
    background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
    padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  #header button:hover { background: #30363d; }
  #header button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  #legend {
    position: fixed; top: 60px; right: 16px; z-index: 10;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 12px 16px; font-size: 12px;
  }
  #legend div { margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  #legend .shape { display: inline-block; }
  #legend .rect { width: 24px; height: 14px; border-radius: 2px; }
  #legend .ellipse { width: 24px; height: 14px; border-radius: 50%; }
  #legend .arrow { width: 24px; height: 2px; position: relative; }
  #legend .arrow::after {
    content: ''; position: absolute; right: -2px; top: -4px;
    border: 5px solid transparent; border-left: 6px solid #8b949e;
  }
  #legend .arrow.reverse::after { left: -2px; right: auto; border-left: none; border-right: 6px solid #8b949e; }
  svg { width: 100vw; height: 100vh; }
  .link { stroke-width: 1.5; fill: none; }
  .link.publish { stroke: #3fb950; }
  .link.subscribe { stroke: #d29922; }
  .link-label { font-size: 10px; fill: #8b949e; pointer-events: none; text-anchor: middle; }
  .node-label { font-size: 11px; fill: #ffffff; pointer-events: none; text-anchor: middle; font-weight: 500; }
  .node-rect { fill: #1f6feb; stroke: #58a6ff; stroke-width: 1.5; rx: 4; ry: 4; }
  .node-ellipse { fill: #238636; stroke: #3fb950; stroke-width: 1.5; }
  .link-arrow-pub { fill: #3fb950; }
  .link-arrow-sub { fill: #d29922; }
  #status { font-size: 11px; color: #8b949e; }
  /* Message viewer panel */
  #msg-viewer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: #161b22; border-top: 1px solid #30363d;
    height: 40vh; display: none; flex-direction: column;
  }
  #msg-viewer.open { display: flex; }
  #msg-viewer #viewer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; border-bottom: 1px solid #30363d; flex-shrink: 0;
  }
  #msg-viewer #viewer-header h3 {
    font-size: 14px; font-weight: 600; color: #58a6ff;
  }
  #msg-viewer #viewer-header button {
    background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
    padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  #msg-viewer #viewer-header button:hover { background: #30363d; }
  #msg-viewer #msg-list {
    overflow-y: auto; padding: 8px 16px; flex: 1;
  }
  #msg-viewer #msg-list .msg-entry {
    padding: 6px 8px; border-bottom: 1px solid #21262d;
    font-size: 13px; display: flex; gap: 8px;
  }
  #msg-viewer #msg-list .msg-entry .msg-topic { color: #58a6ff; font-weight: 500; min-width: 120px; }
  #msg-viewer #msg-list .msg-entry .msg-source { color: #d29922; min-width: 80px; }
  #msg-viewer #msg-list .msg-entry .msg-payload { color: #c9d1d9; flex: 1; white-space: pre-wrap; word-break: break-all; }
  #msg-viewer #msg-list .msg-entry .msg-time { color: #8b949e; font-size: 11px; min-width: 60px; }
  /* Topic highlight when subscribed */
  .node-topic-subscribed ellipse { stroke: #fefe6a !important; stroke-width: 3 !important; fill: #2e8a6e !important; }
  /* Popup menu */
  #topic-menu {
    position: fixed; z-index: 30; display: none;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 0; font-size: 13px; min-width: 160px;
  }
  #topic-menu.open { display: block; }
  #topic-menu .menu-item {
    padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  }
  #topic-menu .menu-item:hover { background: #21262d; }
  #topic-menu .menu-item .check { color: #3fb950; font-weight: 600; width: 20px; }
  #topic-menu .menu-item .uncheck { color: #d29922; font-weight: 600; width: 20px; }
  #topic-menu .menu-divider { border-top: 1px solid #30363d; margin: 0; }
</style>
</head>
<body>
<div id="header">
  <h1>SAR Actor Graph</h1>
  <div class="controls">
    <button id="btn-pub" class="active">Publish</button>
    <button id="btn-sub" class="active">Subscribe</button>
    <button id="btn-labels" class="active">Labels</button>
    <span id="status">Loading...</span>
  </div>
</div>
<div id="legend">
  <div><span class="shape rect" style="background:#1f6feb;border:1px solid #58a6ff"></span> Actor</div>
  <div><span class="shape ellipse" style="background:#238636;border:1px solid #3fb950"></span> Topic</div>
  <div><span class="shape" style="width:24px;height:2px;background:#3fb950;position:relative"><span style="position:absolute;right:-4px;top:-4px;border:5px solid transparent;border-left:6px solid #3fb950"></span></span> Publishes to</div>
  <div><span class="shape" style="width:24px;height:2px;background:#d29922;position:relative"><span style="position:absolute;left:-4px;top:-4px;border:5px solid transparent;border-right:6px solid #d29922"></span></span> Subscribes to</div>
</div>
<svg id="graph"></svg>
<div id="topic-menu">
  <div class="menu-item" id="menu-subscribe">
    <span class="check" id="menu-check-icon">✓</span>
    <span id="menu-text">Subscribe</span>
  </div>
  <div class="menu-divider"></div>
  <div class="menu-item" id="menu-unsubscribe">Unsubscribe All</div>
</div>
<div id="msg-viewer">
  <div id="viewer-header">
    <h3 id="viewer-title">Live Log</h3>
    <span id="viewer-sub-count" style="font-size:12px;color:#8b949e"></span>
    <button id="btn-close-viewer">Close All</button>
  </div>
  <div id="msg-list"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const API_BASE = window.location.origin;
let showPub = true, showSub = true, showLabels = true;
let simulation, svg, g, linkSel, linkLabelSel, nodeSel, nodeLabelSel;
let width, height;
// Multi-subscription state
let subscribedTopics = new Set();  // Set<topicName>
let activeSseConnections = {};     // topicName → EventSource

// Context menu state
let menuTopic = null;
let menuShow = null;

function shortenId(id) {
  if (id.startsWith('sar-')) return id.slice(4);
  if (id.startsWith('tool-')) return id.slice(5);
  if (id.startsWith('mcp-')) return id.slice(4);
  return id;
}

// ---------- Subscription management ----------
function subscribeToTopic(topicName) {
  if (subscribedTopics.has(topicName)) return;
  subscribedTopics.add(topicName);
  updateSubscribedNodes();

  // Connect SSE for this topic
  const url = `${API_BASE}/api/stream/${encodeURIComponent(topicName)}`;
  const es = new EventSource(url);
  activeSseConnections[topicName] = es;
  es.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    const timeStr = new Date().toLocaleTimeString();
    const viewer = document.getElementById('msg-list');
    const entry = document.createElement('div');
    entry.className = 'msg-entry';
    entry.innerHTML = `<span class="msg-time">${timeStr}</span><span class="msg-topic">${msg.topic}</span><span class="msg-source">${msg.source}</span><span class="msg-payload">${JSON.stringify(msg.payload)}</span>`;
    viewer.appendChild(entry);
    viewer.scrollTop = viewer.scrollHeight;
  };
  es.onerror = () => {};
  openViewer();
}

function unsubscribeFromTopic(topicName) {
  if (!subscribedTopics.has(topicName)) return;
  subscribedTopics.delete(topicName);
  // Close its SSE connection
  const es = activeSseConnections[topicName];
  if (es) { es.close(); delete activeSseConnections[topicName]; }
  updateSubscribedNodes();
  if (subscribedTopics.size === 0) closeViewer();
  else updateViewerTitle();
}

function toggleSubscription(topicName) {
  if (subscribedTopics.has(topicName)) unsubscribeFromTopic(topicName);
  else subscribeToTopic(topicName);
}

function updateSubscribedNodes() {
  // Remove highlight from all topics
  d3.selectAll('.node-topic-subscribed').classed('node-topic-subscribed', false);
  // Add highlight to subscribed topics
  for (const t of subscribedTopics) {
    d3.selectAll('.node').filter(d => d.type === 'topic' && d.id === t)
      .classed('node-topic-subscribed', true);
  }
}

function openViewer() {
  document.getElementById('msg-viewer').classList.add('open');
  updateViewerTitle();
}

function closeViewer() {
  document.getElementById('msg-viewer').classList.remove('open');
}

function updateViewerTitle() {
  const count = subscribedTopics.size;
  document.getElementById('viewer-title').textContent = count === 0 ? 'Live Log' : `Live Log (${count})`;
  document.getElementById('viewer-sub-count').textContent = 
    count === 0 ? '' : [...subscribedTopics].join(', ');
}

// ---------- Context menu ----------
function showTopicMenu(topicName, x, y) {
  menuTopic = topicName;
  menuShow = true;
  const menu = document.getElementById('topic-menu');
  menu.classList.add('open');
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';

  const isSubbed = subscribedTopics.has(topicName);
  document.getElementById('menu-text').textContent = isSubbed ? 'Unsubscribe' : 'Subscribe';
  document.getElementById('menu-check-icon').textContent = isSubbed ? '✗' : '✓';
  document.getElementById('menu-subscribe').style.color = isSubbed ? '#d29922' : '#3fb950';
}

function hideTopicMenu() {
  menuTopic = null;
  menuShow = false;
  document.getElementById('topic-menu').classList.remove('open');
}

document.getElementById('menu-subscribe').addEventListener('click', () => {
  if (menuTopic) toggleSubscription(menuTopic);
  hideTopicMenu();
});

document.getElementById('menu-unsubscribe').addEventListener('click', () => {
  hideTopicMenu();
  // Unsubscribe all currently subscribed topics
  for (const t of [...subscribedTopics]) unsubscribeFromTopic(t);
});

document.getElementById('btn-close-viewer').addEventListener('click', () => {
  for (const t of [...subscribedTopics]) unsubscribeFromTopic(t);
  closeViewer();
});

// Close menu when clicking outside
document.addEventListener('click', (e) => {
  if (menuShow && !document.getElementById('topic-menu').contains(e.target)) hideTopicMenu();
});

async function loadData() {
  const [actorsRes, topicsRes] = await Promise.all([
    fetch(`${API_BASE}/api/actors`),
    fetch(`${API_BASE}/api/announced-topics`)
  ]);
  const actors = await actorsRes.json();
  const topics = await topicsRes.json();
  return { actors, topics };
}

function buildGraph(data) {
  const nodes = [];
  const links = [];
  const nodeMap = new Map();

  for (const t of data.topics) {
    const n = { id: t.name, type: 'topic', name: t.name };
    nodes.push(n);
    nodeMap.set(t.name, n);
  }

  for (const a of data.actors) {
    const n = { id: a.id, type: 'actor', name: shortenId(a.id) };
    nodes.push(n);
    nodeMap.set(a.id, n);

    for (const pub of a.publications) {
      if (nodeMap.has(pub)) {
        links.push({ source: a.id, target: pub, type: 'publish' });
      }
    }
    for (const sub of a.subscriptions) {
      if (nodeMap.has(sub)) {
        links.push({ source: sub, target: a.id, type: 'subscribe' });
      }
    }
  }

  return { nodes, links };
}

function initGraph() {
  width = window.innerWidth;
  height = window.innerHeight - 50;

  svg = d3.select('#graph')
    .attr('width', width)
    .attr('height', height);

  svg.append('defs').append('marker')
    .attr('id', 'arrow-pub')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-5L10,0L0,5')
    .attr('class', 'link-arrow-pub');

  svg.append('defs').append('marker')
    .attr('id', 'arrow-sub')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-5L10,0L0,5')
    .attr('class', 'link-arrow-sub');

  g = svg.append('g');
  g.append('g').attr('class', 'links');
  g.append('g').attr('class', 'link-labels');
  g.append('g').attr('class', 'nodes');
  g.append('g').attr('class', 'node-labels');

  simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d => d.id).distance(120).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-1500))
    .force('collision', d3.forceCollide().radius(100).strength(0.8))
    .force('center', d3.forceCenter(width / 2, height / 2).strength(0.05))
    .alphaDecay(0.01)
    .velocityDecay(0.8);

  simulation.on('tick', () => {
    if (linkSel) {
      linkSel.attr('x1', d => d.source.x ?? 0)
        .attr('y1', d => d.source.y ?? 0)
        .attr('x2', d => d.target.x ?? 0)
        .attr('y2', d => d.target.y ?? 0);
    }
    if (linkLabelSel) {
      linkLabelSel.attr('x', d => ((d.source.x ?? 0) + (d.target.x ?? 0)) / 2)
        .attr('y', d => ((d.source.y ?? 0) + (d.target.y ?? 0)) / 2 - 5);
    }
    if (nodeSel) {
      nodeSel.attr('transform', d => `translate(${d.x ?? 0},${d.y ?? 0})`);
    }
    if (nodeLabelSel) {
      nodeLabelSel.attr('x', d => d.x ?? 0)
        .attr('y', d => (d.y ?? 0) + (d.type === 'topic' ? 28 : 22));
    }
  });

  svg.call(d3.zoom()
    .scaleExtent([0.2, 4])
    .on('zoom', (event) => g.attr('transform', event.transform)));

  simulation.on('tick', () => {
    if (linkSel) {
      linkSel.attr('x1', d => d.source.x ?? 0)
        .attr('y1', d => d.source.y ?? 0)
        .attr('x2', d => d.target.x ?? 0)
        .attr('y2', d => d.target.y ?? 0);
    }
    if (linkLabelSel) {
      linkLabelSel.attr('x', d => ((d.source.x ?? 0) + (d.target.x ?? 0)) / 2)
        .attr('y', d => ((d.source.y ?? 0) + (d.target.y ?? 0)) / 2 - 5);
    }
    if (nodeSel) {
      nodeSel.attr('transform', d => `translate(${d.x ?? 0},${d.y ?? 0})`);
    }
    if (nodeLabelSel) {
      nodeLabelSel.attr('x', d => d.x ?? 0)
        .attr('y', d => (d.y ?? 0) + (d.type === 'topic' ? 28 : 22));
    }
  });
}

let dragstarted = (e, d) => {
  d.fx = d.x; d.fy = d.y;
  if (!simulation.running) {
    for (const n of simulation.nodes()) { n.fx = null; n.fy = null; }
    simulation.alpha(0.5).restart();
  }
};
let dragged = (e, d) => { d.fx = e.x; d.fy = e.y; };
let dragended = (e, d) => {
  d.fx = null; d.fy = null;
};

function updateGraph(data, initial = false) {
  const graph = buildGraph(data);

  linkSel = g.select('.links').selectAll('.link')
    .data(graph.links, d => `${d.source.id || d.source}-${d.type}-${d.target.id || d.target}`);

  linkSel.exit().remove();

  const linkEnter = linkSel.enter().append('line')
    .attr('class', d => `link ${d.type}`)
    .attr('marker-end', d => d.type === 'publish' ? 'url(#arrow-pub)' : 'url(#arrow-sub)');

  const linkMerge = linkEnter.merge(linkSel);
  linkSel = linkMerge;

  linkLabelSel = g.select('.link-labels').selectAll('.link-label')
    .data(graph.links, d => `${d.source.id || d.source}-${d.type}-${d.target.id || d.target}`);

  linkLabelSel.exit().remove();

  linkLabelSel = linkLabelSel.enter().append('text')
    .attr('class', 'link-label')
    .text(d => d.type === 'publish' ? '→' : '←')
    .merge(linkLabelSel);

  nodeSel = g.select('.nodes').selectAll('.node')
    .data(graph.nodes, d => d.id);

  nodeSel.exit().remove();

  const nodeEnter = nodeSel.enter().append('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended));

  nodeEnter.filter(d => d.type === 'actor')
    .append('rect').attr('class', 'node-rect')
    .attr('width', 100).attr('height', 30).attr('x', -50).attr('y', -15);

  nodeEnter.filter(d => d.type === 'topic')
    .append('ellipse').attr('class', 'node-ellipse')
    .attr('rx', 40).attr('ry', 16)
    .style('cursor', 'pointer')
    .on('click', (event, d) => {
      if (event.altKey || event.metaKey || event.ctrlKey) {
        event.preventDefault();
        showTopicMenu(d.id, event.pageX, event.pageY);
        return;
      }
      // Regular click: subscribe to this single topic (replaces all others)
      for (const t of [...subscribedTopics]) unsubscribeFromTopic(t);
      subscribeToTopic(d.id);
    })
    .on('contextmenu', (event, d) => {
      event.preventDefault();
      showTopicMenu(d.id, event.pageX, event.pageY);
    });

  const nodeMerge = nodeEnter.merge(nodeSel);
  nodeSel = nodeMerge;

  nodeLabelSel = g.select('.node-labels').selectAll('.node-label')
    .data(graph.nodes, d => d.id);

  nodeLabelSel.exit().remove();

  nodeLabelSel = nodeLabelSel.enter().append('text')
    .attr('class', 'node-label')
    .text(d => d.name)
    .merge(nodeLabelSel);

  if (initial) {
    // Give nodes initial positions so labels are visible immediately
    for (const n of graph.nodes) {
      n.x = width / 2 + (Math.random() - 0.5) * 300;
      n.y = height / 2 + (Math.random() - 0.5) * 300;
    }

    simulation.nodes(graph.nodes);
    simulation.force('link').links(graph.links);
    simulation.alpha(0.3);
  } else {
    // Refresh: only update links, preserve node positions
    simulation.force('link').links(graph.links);
  }

  linkSel.style('display', d => {
    if (d.type === 'publish' && !showPub) return 'none';
    if (d.type === 'subscribe' && !showSub) return 'none';
    return 'block';
  });

  linkLabelSel.style('display', d => {
    if (d.type === 'publish' && !showPub) return 'none';
    if (d.type === 'subscribe' && !showSub) return 'none';
    return showLabels ? 'block' : 'none';
  });

  nodeLabelSel.style('display', showLabels ? 'block' : 'none');

  document.getElementById('status').textContent =
    `${graph.nodes.length} nodes, ${graph.links.length} connections`;
}

async function main() {
  initGraph();
  const data = await loadData();
  updateGraph(data, true);
}

document.getElementById('btn-pub').addEventListener('click', function() {
  showPub = !showPub;
  this.classList.toggle('active', showPub);
  loadData().then(updateGraph);
});

document.getElementById('btn-sub').addEventListener('click', function() {
  showSub = !showSub;
  this.classList.toggle('active', showSub);
  loadData().then(updateGraph);
});

document.getElementById('btn-labels').addEventListener('click', function() {
  showLabels = !showLabels;
  this.classList.toggle('active', showLabels);
  loadData().then(updateGraph);
});

window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight - 50;
  svg.attr('width', width).attr('height', height);
  simulation.force('center', d3.forceCenter(width / 2, height / 2));
  simulation.alpha(0.3);
  simulation.restart();
});

main();
</script>
</body>
</html>
