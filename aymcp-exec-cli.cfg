max_concurrent_calls: 10
connect_timeout_secs: 30
command_timeout_secs: 60
ipv4_delay_ms: 300
default_ssh_port: 22
default_telnet_port: 23
default_vendor: cisco
credentials:
  username_env: AYMCP_USERNAME
  password_env: AYMCP_PASSWORD
  ssh_key_path_env: AYMCP_SSH_KEY_PATH
connection_paths:
  direct-ssh:
    hops:
      - transport_ssh:
          target: "{target}"
  direct-telnet:
    hops:
      - transport_telnet:
          target: "{target}"
vendor_profiles:
  cisco:
    post_login_template: CISCO_IOS_SSH_POST_LOGIN
    prompt_template: CISCO_IOS_PROMPT
    serial_command: "show version"
    serial_regex: "Processor board ID (\\S+)"
  generic:
    post_login_template: ~
    prompt_template: ~
    serial_command: ~
    serial_regex: ~
access_rules:
  - match: "127.0.0.1/32"
    allow: true
    denied_command_patterns:
      - "^reload"
      - "^write erase"
    allowed_command_patterns:
      - "^show "
      - "^ping "
    connection_path: direct-ssh
  - match: "192.168.0.0/24"
    allow: true
    denied_command_patterns:
      - "^reload"
      - "^write erase"
    allowed_command_patterns:
      - "^show "
      - "^ping "
    connection_path: direct-ssh
  - match: "::1/128"
    allow: true
    denied_command_patterns:
      - "^reload"
      - "^write erase"
    allowed_command_patterns:
      - "^show "
      - "^ping "
    connection_path: direct-ssh
  - match: "10.0.0.0/8"
    allow: false
  - match: "HOST:.*\\.example\\.com"
    allow: true
    denied_command_patterns:
      - "^reload"
    allowed_command_patterns:
      - "^show "
    connection_path: direct-ssh
  - match: "SN:SAMPLE"
    allow: true
    denied_command_patterns: []
    allowed_command_patterns:
      - "^show "
    connection_path: direct-ssh
